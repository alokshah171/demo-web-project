<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alok Store</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
}

.cart {
    background: orange;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

.container {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

button {
    background: black;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
}

button:hover {
    background: orange;
}

#cart-items {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>
<body>

<header>
    <h1>Alok Store</h1>
    <div class="cart" onclick="toggleCart()">Cart 🛒 (<span id="count">0</span>)</div>
</header>

<div class="container">

    <div class="products">
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Gaming Mouse</h3>
            <p>₹999</p>
            <button onclick="addToCart('Gaming Mouse', 999)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Headphones</h3>
            <p>₹1499</p>
            <button onclick="addToCart('Headphones', 1499)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Keyboard</h3>
            <p>₹1999</p>
            <button onclick="addToCart('Keyboard', 1999)">Add to Cart</button>
        </div>
    </div>

    <div id="cart-items" style="display:none;">
        <h2>Your Cart</h2>
        <ul id="cart-list"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>
        <button onclick="checkout()">Checkout</button>
    </div>

</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("count").innerText = cart.length;
    updateCart();
}

function updateCart() {
    let list = document.getElementById("cart-list");
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item.name + " - ₹" + item.price;
        list.appendChild(li);
    });

    document.getElementById("total").innerText = total;
}

function toggleCart() {
    let cartSection = document.getElementById("cart-items");
    cartSection.style.display = cartSection.style.display === "none" ? "block" : "none";
}

function checkout() {
    alert("Thank you for shopping with Alok Store!");
    cart = [];
    total = 0;
    document.getElementById("count").innerText = 0;
    updateCart();
}
</script>

</body>
</html>
