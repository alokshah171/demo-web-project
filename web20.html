<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Template</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #e5ddd5;
    }

    /* App container */
    .app {
        width: 360px;
        height: 640px;
        margin: 20px auto;
        background-color: #fff;
        border: 1px solid #ccc;
        display: flex;
        flex-direction: column;
    }

    /* Header */
    .header {
        background-color: #075e54;
        color: white;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
    }

    /* Chat list */
    .chat-list {
        flex: 1;
        background-color: #f0f0f0;
        padding: 10px;
    }

    /* Single chat item */
    .chat {
        background-color: #fff;
        padding: 15px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        cursor: pointer;
    }

    .avatar {
        width: 45px;
        height: 45px;
        background-color: #25d366;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        margin-right: 10px;
    }

    .chat-name {
        font-size: 16px;
        font-weight: bold;
    }

    /* Footer */
    .footer {
        background-color: #ededed;
        padding: 10px;
        text-align: center;
        font-size: 12px;
        color: #555;
    }
</style>
</head>
<body>

<div class="app">
    <div class="header">WhatsApp</div>

    <div class="chat-list">
        <div class="chat">
            <div class="avatar">G</div>
            <div class="chat-name">GROUP</div>
        </div>
    </div>

    <div class="footer">Only one chat shown</div>
</div>

</body>
</html>
